name: sync

on:
  schedule:
    # Tous les jours à 01:00 (heure UTC du runner)
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install system deps (CA, OpenSSL, curl)
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates openssl curl
          sudo update-ca-certificates

      - name: Install dependencies
        env:
          PIP_DEFAULT_TIMEOUT: "120"
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # (Optionnel) si tu utilises Playwright dans le projet
      - name: Install Playwright browsers
        timeout-minutes: 15
        run: |
          python -m playwright install --with-deps chromium

      # ✅ TLS strict : on construit un bundle CA incluant l'intermédiaire BDPM (AIA)
      - name: Build BDPM CA bundle (TLS strict)
        run: |
          set -euo pipefail
          HOST=base-donnees-publique.medicaments.gouv.fr

          # Récupère le certificat "leaf" (1er cert) juste pour lire l'AIA (pas de vérification ici)
          echo | openssl s_client -connect ${HOST}:443 -servername ${HOST} -showcerts 2>/dev/null \
            | awk 'BEGIN{c=0} /BEGIN CERTIFICATE/{c++} c==1{print} /END CERTIFICATE/{if(c==1) exit}' \
            > /tmp/bdpm_leaf.pem

          # Extrait l'URL "CA Issuers" (certificat intermédiaire)
          AIA_URL=$(openssl x509 -in /tmp/bdpm_leaf.pem -noout -text \
            | awk -F'URI:' '/CA Issuers - URI:/{print $2; exit}' | tr -d '\r')

          if [ -z "${AIA_URL}" ]; then
            echo "Impossible d'extraire l'URL CA Issuers depuis le certificat BDPM" >&2
            exit 1
          fi

          echo "AIA (intermediate) URL: ${AIA_URL}"

          # Télécharge l'intermédiaire (souvent en DER), convertit en PEM
          curl -fsSL "${AIA_URL}" -o /tmp/bdpm_intermediate.der
          openssl x509 -inform der -in /tmp/bdpm_intermediate.der -out /tmp/bdpm_intermediate.pem

          # Construit un bundle : intermédiaire + CA système
          cat /tmp/bdpm_intermediate.pem /etc/ssl/certs/ca-certificates.crt > /tmp/bdpm_ca_bundle.pem

          # Exporte pour les steps suivants (requests respectera REQUESTS_CA_BUNDLE)
          echo "REQUESTS_CA_BUNDLE=/tmp/bdpm_ca_bundle.pem" >> $GITHUB_ENV
          echo "SSL_CERT_FILE=/tmp/bdpm_ca_bundle.pem" >> $GITHUB_ENV

          # Test strict (doit passer sans verify=False)
          python - <<'PY'
          import os, requests
          url="https://base-donnees-publique.medicaments.gouv.fr/download/file/CIS_bdpm.txt"
          print("bundle:", os.getenv("REQUESTS_CA_BUNDLE"))
          r=requests.get(url, timeout=60)
          print("status:", r.status_code, "len:", len(r.content))
          r.raise_for_status()
          PY

      - name: Run sync
        timeout-minutes: 300
        env:
          AIRTABLE_API_TOKEN: ${{ secrets.AIRTABLE_API_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_CIS_TABLE_NAME: ${{ secrets.AIRTABLE_CIS_TABLE_NAME }}
          AIRTABLE_MIN_DELAY_S: "0.25"
          UPDATE_FLUSH_THRESHOLD: "200"
        run: |
          python -u scripts/import_and_enrich_bdpm_to_airtable.py
