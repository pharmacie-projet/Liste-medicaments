name: sync

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements.txt

      - name: Install system deps (CA, OpenSSL, curl)
        run: |
          sudo apt-get update
          sudo apt-get install -y ca-certificates openssl curl
          sudo update-ca-certificates

      - name: Install dependencies
        env:
          PIP_DEFAULT_TIMEOUT: "120"
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # (Optionnel) si Playwright est utilisé
      - name: Install Playwright browsers
        timeout-minutes: 15
        run: |
          python -m playwright install --with-deps chromium

      # ✅ TLS strict : construit un bundle CA incluant tous les intermédiaires via AIA
      - name: Build BDPM CA bundle (TLS strict)
        run: |
          set -euo pipefail
          HOST=base-donnees-publique.medicaments.gouv.fr
          WORKDIR=/tmp/bdpm_tls
          mkdir -p "$WORKDIR"

          echo ">>> Fetch leaf cert"
          echo | openssl s_client -connect ${HOST}:443 -servername ${HOST} -showcerts 2>/dev/null \
            | awk 'BEGIN{c=0} /BEGIN CERTIFICATE/{c++} c==1{print} /END CERTIFICATE/{if(c==1) exit}' \
            > "$WORKDIR/leaf.pem"

          # On va télécharger les intermédiaires (parfois 1 seul, parfois plusieurs)
          CHAIN_PEM="$WORKDIR/intermediates.pem"
          : > "$CHAIN_PEM"
          CUR="$WORKDIR/leaf.pem"

          for i in 1 2 3 4 5; do
            # URL CA Issuers (peut être vide si on est déjà au bout)
            AIA_URL=$(openssl x509 -in "$CUR" -noout -text \
              | awk -F'URI:' '/CA Issuers - URI:/{print $2; exit}' | tr -d '\r' || true)

            if [ -z "${AIA_URL}" ]; then
              echo ">>> No more AIA (stop at depth $i)"
              break
            fi

            echo ">>> AIA URL (depth $i): ${AIA_URL}"

            # Télécharge l'intermédiaire
            curl -fsSL "${AIA_URL}" -o "$WORKDIR/int_${i}.crt"

            # Détecte PEM vs DER, convertit en PEM si besoin
            if grep -q "BEGIN CERTIFICATE" "$WORKDIR/int_${i}.crt"; then
              cp "$WORKDIR/int_${i}.crt" "$WORKDIR/int_${i}.pem"
            else
              openssl x509 -inform der -in "$WORKDIR/int_${i}.crt" -out "$WORKDIR/int_${i}.pem"
            fi

            # Append au fichier des intermédiaires
            cat "$WORKDIR/int_${i}.pem" >> "$CHAIN_PEM"
            echo "" >> "$CHAIN_PEM"

            # Si l'intermédiaire est auto-signé (rare ici), stop
            SUBJ=$(openssl x509 -in "$WORKDIR/int_${i}.pem" -noout -subject || true)
            ISSU=$(openssl x509 -in "$WORKDIR/int_${i}.pem" -noout -issuer  || true)
            if [ "$SUBJ" = "$ISSU" ]; then
              echo ">>> Reached self-signed cert at depth $i (stop)"
              CUR="$WORKDIR/int_${i}.pem"
              break
            fi

            CUR="$WORKDIR/int_${i}.pem"
          done

          # Bundle final : intermédiaires + CA système
          BUNDLE="$WORKDIR/bdpm_ca_bundle.pem"
          cat "$CHAIN_PEM" /etc/ssl/certs/ca-certificates.crt > "$BUNDLE"

          echo ">>> Bundle created: $BUNDLE"
          ls -l "$BUNDLE"

          # IMPORTANT : pour ce step (export) + pour les steps suivants (GITHUB_ENV)
          export REQUESTS_CA_BUNDLE="$BUNDLE"
          export SSL_CERT_FILE="$BUNDLE"
          echo "REQUESTS_CA_BUNDLE=$BUNDLE" >> $GITHUB_ENV
          echo "SSL_CERT_FILE=$BUNDLE" >> $GITHUB_ENV

          # Test TLS strict (doit passer)
          python - <<'PY'
          import os, requests
          url="https://base-donnees-publique.medicaments.gouv.fr/download/file/CIS_bdpm.txt"
          bundle=os.environ["REQUESTS_CA_BUNDLE"]
          print("Using bundle:", bundle)
          r = requests.get(url, timeout=60, verify=bundle)  # explicite
          print("status:", r.status_code, "len:", len(r.content))
          r.raise_for_status()
          PY

      - name: Run sync
        timeout-minutes: 300
        env:
          AIRTABLE_API_TOKEN: ${{ secrets.AIRTABLE_API_TOKEN }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          AIRTABLE_CIS_TABLE_NAME: ${{ secrets.AIRTABLE_CIS_TABLE_NAME }}
          AIRTABLE_MIN_DELAY_S: "0.25"
          UPDATE_FLUSH_THRESHOLD: "200"
        run: |
          python -u scripts/import_and_enrich_bdpm_to_airtable.py
